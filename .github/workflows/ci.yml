name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Sem "version:" aqui de propósito: o action lê a versão do campo
      # "packageManager" do package.json (pnpm@9.15.0) — declarar os dois
      # ao mesmo tempo é erro ("Multiple versions of pnpm specified").
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
