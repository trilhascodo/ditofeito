# Copiar pra /etc/nginx/ditofeito-proxy.conf na VPS (fora de sites-available/
# porque é compartilhado por várias location{} do mesmo server{} — nginx não
# deixa "include" de dentro de sites-available referenciar outro arquivo em
# sites-available facilmente sem duplicar). Ver infra/nginx/README.md.
proxy_pass http://127.0.0.1:3200;
proxy_http_version 1.1;
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_cookie_path / /;
proxy_pass_header Set-Cookie;
proxy_read_timeout 60s;
client_max_body_size 10M;
