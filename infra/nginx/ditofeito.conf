# Bloco inicial HTTP — o certbot reescreve este arquivo em produção para
# adicionar o server{} de 443/ssl + redirect 80->443 (mesmo padrão usado nos
# outros apps da VPS, ver infra/nginx/README.md). Versão pré-certbot aqui só
# para referência/histórico; o arquivo real vive em
# /etc/nginx/sites-available/ditofeito na VPS depois que o certbot roda.
server {
    listen 80;
    listen [::]:80;
    server_name ditofeito.147-79-106-18.nip.io;
    # Trocar/adicionar ditofeito.com.br e www.ditofeito.com.br aqui assim que
    # o DNS apontar pra esta VPS (ver README §"Domínio definitivo").

    location / {
        proxy_pass http://127.0.0.1:3200;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cookie_path / /;
        proxy_pass_header Set-Cookie;
        proxy_read_timeout 60s;
        client_max_body_size 10M;
    }

    location /.well-known/acme-challenge/ { root /var/www/certbot; }
}
