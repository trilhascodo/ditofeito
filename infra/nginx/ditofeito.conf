# Bloco inicial HTTP — o certbot reescreve este arquivo em produção para
# adicionar o server{} de 443/ssl + redirect 80->443 (mesmo padrão usado nos
# outros apps da VPS, ver infra/nginx/README.md). Versão pré-certbot aqui só
# para referência/histórico; o arquivo real vive em
# /etc/nginx/sites-available/ditofeito na VPS depois que o certbot roda.
#
# ATENÇÃO: reaplicar este arquivo por cima do arquivo em produção destrói o
# server{} de SSL que o certbot adicionou — sempre rodar certbot --expand
# (comando em infra/nginx/README.md) logo em seguida.

# map precisa estar no contexto http{} — este arquivo é incluído direto
# dentro do http{} do nginx.conf (via sites-enabled/*), então definir aqui,
# fora do server{}, é válido. Detecta crawlers de rede social pelo
# User-Agent pra desviar /m/:slug pro HTML com <meta og:*> de verdade
# (apps/api/src/http/embed.ts, rota /share/:slug) — humano continua na SPA.
map $http_user_agent $df_is_social_bot {
    default 0;
    ~*facebookexternalhit 1;
    ~*Facebot              1;
    ~*Twitterbot           1;
    ~*WhatsApp             1;
    ~*LinkedInBot          1;
    ~*Slackbot             1;
    ~*TelegramBot          1;
    ~*Discordbot           1;
    ~*Pinterest            1;
    ~*redditbot            1;
    ~*SkypeUriPreview      1;
}

server {
    listen 80;
    listen [::]:80;
    server_name ditofeito.com www.ditofeito.com ditofeito.147-79-106-18.nip.io;

    # API (apps/api, container em 127.0.0.1:3200) — só os prefixos que são
    # dela; tudo o mais é o frontend estático servido abaixo.
    location /trpc/ { include /etc/nginx/ditofeito-proxy.conf; }
    location /auth/ { include /etc/nginx/ditofeito-proxy.conf; }
    location /embed/ { include /etc/nginx/ditofeito-proxy.conf; }
    location /api/pub/ { include /etc/nginx/ditofeito-proxy.conf; }
    location /card/ { include /etc/nginx/ditofeito-proxy.conf; }
    location /vindicacao/ { include /etc/nginx/ditofeito-proxy.conf; }
    location /ir/ { include /etc/nginx/ditofeito-proxy.conf; }
    location = /health { include /etc/nginx/ditofeito-proxy.conf; }
    location = /sitemap.xml { include /etc/nginx/ditofeito-proxy.conf; }

    # Bot de rede social pedindo /m/:slug -> desvia pro HTML server-rendered
    # com meta og:* de verdade (rota /share/:slug da API); humano continua
    # na SPA normal. Único `if` deste arquivo, e só com `rewrite ... last`
    # dentro dele — a forma documentada como segura (ver infra/nginx/README.md
    # se algum dia for preciso reexplicar; "if is evil" só se aplica a usos
    # mais complexos, ex. proxy_pass dentro do próprio if).
    location ~ ^/m/(?<mslug>[a-z0-9-]+)/?$ {
        if ($df_is_social_bot) {
            rewrite ^ /share/$mslug last;
        }
        try_files $uri /index.html;
    }
    location /share/ { include /etc/nginx/ditofeito-proxy.conf; }

    # Frontend (apps/web, build estático — deploy.sh roda `pnpm build` na
    # própria VPS antes de subir os containers, ver infra/scripts/deploy.sh).
    root /var/www/ditofeito/apps/web/dist;
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /.well-known/acme-challenge/ { root /var/www/certbot; }
}
