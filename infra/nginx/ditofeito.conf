# Bloco inicial HTTP — o certbot reescreve este arquivo em produção para
# adicionar o server{} de 443/ssl + redirect 80->443 (mesmo padrão usado nos
# outros apps da VPS, ver infra/nginx/README.md). Versão pré-certbot aqui só
# para referência/histórico; o arquivo real vive em
# /etc/nginx/sites-available/ditofeito na VPS depois que o certbot roda.
#
# ATENÇÃO: reaplicar este arquivo por cima do arquivo em produção destrói o
# server{} de SSL que o certbot adicionou — sempre rodar certbot --expand
# (comando em infra/nginx/README.md) logo em seguida.
server {
    listen 80;
    listen [::]:80;
    server_name ditofeito.com www.ditofeito.com ditofeito.147-79-106-18.nip.io;

    # API (apps/api, container em 127.0.0.1:3200) — só os prefixos que são
    # dela; tudo o mais é o frontend estático servido abaixo.
    location /trpc/ { include /etc/nginx/ditofeito-proxy.conf; }
    location /auth/ { include /etc/nginx/ditofeito-proxy.conf; }
    location /embed/ { include /etc/nginx/ditofeito-proxy.conf; }
    location /api/pub/ { include /etc/nginx/ditofeito-proxy.conf; }
    location /card/ { include /etc/nginx/ditofeito-proxy.conf; }
    location = /health { include /etc/nginx/ditofeito-proxy.conf; }

    # Frontend (apps/web, build estático — deploy.sh roda `pnpm build` na
    # própria VPS antes de subir os containers, ver infra/scripts/deploy.sh).
    root /var/www/ditofeito/apps/web/dist;
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /.well-known/acme-challenge/ { root /var/www/certbot; }
}
