# Nome de projeto explícito: evita colisão de nomes de container/rede caso
# outro app algum dia rode compose a partir de uma pasta também chamada "infra".
name: ditofeito

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ditofeito
      POSTGRES_USER: ditofeito
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?defina POSTGRES_PASSWORD no .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # SEM ports: — só acessível pela rede interna do compose (postgres:5432).
    # Em VPS compartilhada isso evita qualquer conflito com um Postgres nativo
    # já rodando na 5432 (é o caso da VPS de produção) e não expõe o banco.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ditofeito"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://ditofeito:${POSTGRES_PASSWORD}@postgres:5432/ditofeito
      NODE_ENV: production
      PORT: 3000
      WEB_ORIGIN: "${WEB_ORIGIN:?defina WEB_ORIGIN no infra/.env, ex. https://ditofeito.com}"
      APP_BASE_URL: ${APP_BASE_URL:-https://ditofeito.com}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-DitoFeito <nao-responda@ditofeito.com>}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY:-}
    ports:
      # Porta do HOST é configurável (VPS compartilhada: outros apps já usam
      # 3000-3003/3100) — nginx do host faz o proxy_pass pra cá. Loopback-only:
      # com UFW inativo na VPS, 0.0.0.0 aqui exporia a API direto pra internet.
      - "127.0.0.1:${API_HOST_PORT:-3000}:3000"

# Sem serviço de proxy/TLS aqui de propósito: numa VPS compartilhada, o nginx
# nativo do host já ocupa 80/443 e é gerenciado pelo certbot (ver infra/nginx/
# e o runbook em infra/scripts/deploy.sh). O infra/Caddyfile fica guardado
# para o cenário de VPS dedicada só para o DitoFeito.

volumes:
  pgdata:
